# ────────────────────────────────────────────
# 状态栏 —— 背景透明继承终端配色
# ────────────────────────────────────────────
set -g status on
set -g status-interval 5                # 每5秒刷新
set -g status-position bottom           # 状态栏在底部
set -g status-justify left

# 状态栏整体：背景使用 default（继承终端背景）
set -g status-style 'fg=colour8,bg=color0'

# 左侧：显示 Session 名
set -g status-left-length 30
set -g status-left '#[fg=colour4,bold] #S #[fg=colour8]│'

# 右侧：显示用户@主机 + 时间
set -g status-right-length 60
set -g status-right '#[fg=colour8]│ #[fg=colour8]#(whoami)#[fg=colour8]@#[fg=colour8]#H  #[fg=colour4]%H:%M  #[fg=colour8]%m/%d '

# 窗口列表：普通窗口
setw -g window-status-format         ' #I:#W '
setw -g window-status-style          'fg=colour8,bg=default'

# 窗口列表：当前活动窗口（高亮）
setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-current-style  'fg=colour4,bold,bg=default'

# 窗口列表：上一个访问的窗口
setw -g window-status-last-style     'fg=colour8,bg=default'

# 消息/命令行提示颜色
set -g message-style 'fg=colour4,bg=default,bold'

